name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write     # create GitHub Release + upload assets
  id-token: write     # npm provenance via Sigstore

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - { runner: macos-14,         target: bun-darwin-arm64,  os: darwin,  cpu: arm64, binary: tour     }
          - { runner: macos-15-intel,   target: bun-darwin-x64,    os: darwin,  cpu: x64,   binary: tour     }
          - { runner: ubuntu-22.04-arm, target: bun-linux-arm64,   os: linux,   cpu: arm64, binary: tour     }
          - { runner: ubuntu-22.04,     target: bun-linux-x64,     os: linux,   cpu: x64,   binary: tour     }
          - { runner: windows-2022,     target: bun-windows-x64,   os: windows, cpu: x64,   binary: tour.exe }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Compile binary
        shell: bash
        run: |
          mkdir -p dist/binaries/${{ matrix.os }}-${{ matrix.cpu }}
          bun scripts/build-binary.ts \
            ${{ matrix.target }} \
            dist/binaries/${{ matrix.os }}-${{ matrix.cpu }}/${{ matrix.binary }}
      - name: Smoke test --version
        shell: bash
        # Run only when the runner architecture matches the target binary architecture (no cross-compile execution).
        if: matrix.os != 'windows' && ((matrix.cpu == 'arm64' && runner.arch == 'ARM64') || (matrix.cpu == 'x64' && runner.arch == 'X64'))
        run: ./dist/binaries/${{ matrix.os }}-${{ matrix.cpu }}/${{ matrix.binary }} --version
      - name: Smoke test serve
        # Catches "ships fine in dev, dies in --compile" bugs that --version
        # alone misses (e.g. missing embedded modules, broken Bun.build at
        # runtime, unresolvable bare specifiers). Boots the binary, fetches
        # the two browser-facing bundles, and asserts they're real JS — not
        # 500 stubs and not the error-comment fallback from server.ts.
        shell: bash
        if: matrix.os != 'windows' && ((matrix.cpu == 'arm64' && runner.arch == 'ARM64') || (matrix.cpu == 'x64' && runner.arch == 'X64'))
        env:
          BIN: ./dist/binaries/${{ matrix.os }}-${{ matrix.cpu }}/${{ matrix.binary }}
          PORT: '17777'
        run: |
          set -euo pipefail
          "$BIN" serve --port "$PORT" > serve.log 2>&1 &
          SERVE_PID=$!
          trap "kill $SERVE_PID 2>/dev/null || true; wait $SERVE_PID 2>/dev/null || true" EXIT

          fetch() {
            local path="$1" out="$2"
            # --retry-connrefused covers the boot window; the first request
            # also pays the Bun.build cost, so allow generous retries.
            curl --retry-connrefused --retry 60 --retry-delay 1 \
              -fsS "http://127.0.0.1:$PORT$path" -o "$out"
          }

          assert_bundle() {
            local path="$1" out="$2"
            if ! fetch "$path" "$out"; then
              echo "ERROR: $path did not return 2xx" >&2
              echo "--- serve.log ---" >&2
              cat serve.log >&2
              exit 1
            fi
            # server.ts emits "/* client bundle failed: ... */" / "Cannot
            # find module ..." on resolve/build failure with a 500 — those
            # would already fail the fetch above, but check the body too in
            # case the failure mode changes.
            if grep -E "Cannot find module|client bundle (failed|threw)|entry-point not emitted" "$out" >/dev/null; then
              echo "ERROR: $path returned an error stub:" >&2
              cat "$out" >&2
              exit 1
            fi
            local size
            size=$(wc -c < "$out")
            if [ "$size" -lt 1024 ]; then
              echo "ERROR: $path suspiciously small ($size bytes)" >&2
              cat "$out" >&2
              exit 1
            fi
            echo "OK: $path served $size bytes"
          }

          assert_bundle /client.js client.js.out
          assert_bundle /pierre-worker.js pierre-worker.js.out
      - uses: actions/upload-artifact@v5
        with:
          name: binary-${{ matrix.os }}-${{ matrix.cpu }}
          path: dist/binaries/${{ matrix.os }}-${{ matrix.cpu }}/${{ matrix.binary }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - uses: actions/download-artifact@v5
        with:
          path: dist/artifacts
      - name: Stage binaries
        run: |
          mkdir -p dist/binaries
          for d in dist/artifacts/binary-*; do
            name=$(basename "$d" | sed 's/^binary-//')
            mkdir -p "dist/binaries/$name"
            cp "$d"/* "dist/binaries/$name/"
            chmod +x "dist/binaries/$name"/* || true
          done
      - run: bun scripts/assemble-packages.ts
      - name: Publish sub-packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in dist/packages/*; do
            (cd "$pkg" && npm publish --access public --provenance)
          done
      - name: Publish parent
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
      - name: Stage release assets
        run: |
          mkdir -p dist/release
          for d in dist/binaries/*/; do
            name=$(basename "$d")
            for f in "$d"*; do
              ext=""
              case "$f" in *.exe) ext=".exe" ;; esac
              cp "$f" "dist/release/tour-$name$ext"
            done
          done
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/release/*
          generate_release_notes: true

  bump-formula:
    needs: publish
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Resolve version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v5
        with:
          path: dist/artifacts

      - name: Compute SHA256s
        id: sha
        run: |
          set -euo pipefail
          for plat in darwin-arm64 darwin-x64 linux-arm64 linux-x64; do
            f="dist/artifacts/binary-$plat/tour"
            [ -f "$f" ] || { echo "missing $f"; exit 1; }
            sha=$(sha256sum "$f" | awk '{print $1}')
            echo "$plat=$sha" >> "$GITHUB_OUTPUT"
          done

      - name: Checkout homebrew-tap
        uses: actions/checkout@v5
        with:
          repository: a9a4k/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SHA_DARWIN_ARM64: ${{ steps.sha.outputs.darwin-arm64 }}
          SHA_DARWIN_X64:   ${{ steps.sha.outputs.darwin-x64 }}
          SHA_LINUX_ARM64:  ${{ steps.sha.outputs.linux-arm64 }}
          SHA_LINUX_X64:    ${{ steps.sha.outputs.linux-x64 }}
        run: |
          set -euo pipefail
          sed -i "s|version \"[^\"]*\"|version \"$VERSION\"|" Formula/tour.rb
          update_sha() {
            local asset="$1" sha="$2"
            local url_line
            url_line=$(grep -n "tour-$asset\"" Formula/tour.rb | head -1 | cut -d: -f1)
            local sha_line=$((url_line + 1))
            sed -i "${sha_line}s/[a-f0-9]\{64\}/$sha/" Formula/tour.rb
          }
          update_sha darwin-arm64 "$SHA_DARWIN_ARM64"
          update_sha darwin-x64   "$SHA_DARWIN_X64"
          update_sha linux-arm64  "$SHA_LINUX_ARM64"
          update_sha linux-x64    "$SHA_LINUX_X64"

      - name: Commit and push
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Formula already at $VERSION — nothing to do."
            exit 0
          fi
          git add Formula/tour.rb
          git commit -m "tour: bump to $VERSION"
          git push
